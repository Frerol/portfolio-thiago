<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Thiago de Assis (Contato)</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Thiago de Assis</h1>
        </div>
        <nav>
            <div class="menu-icon">&#9776;</div>
            <ul>
                <li><a href="index.html">Sobre mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
        <button class="theme-toggle">Modo Escuro</button>
    </header>

    <main>
        <section id="contato">
            <h2>Contato</h2>
            <p class="margin-top-1 margin-bottom-2">Tem alguma dúvida, proposta ou quer apenas trocar uma ideia sobre tecnologia? Preencha o formulário abaixo e retornarei o mais breve possível.</p>
            
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <label for="name">Nome:</label>
                    <input type="text" id="name" name="name" placeholder="Seu nome completo">
                    <span id="name-error" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com">
                    <span id="email-error" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="message">Mensagem:</label>
                    <textarea id="message" name="message" placeholder="Como posso ajudar você hoje?"></textarea>
                    <span id="message-error" class="error-message"></span>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Thiago de Assis. Todos os direitos reservados.</p>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
